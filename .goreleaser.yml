version: 2

project_name: ganbatte

builds:
  - binary: gnb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - repository:
      owner: bssm-oss
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/bssm-oss/ganbatte
    description: "Workflow/shortcut management CLI for lazy developers"
    license: MIT
    binaries:
      - gnb
    generate_completions_from_executable:
      executable: "bin/gnb"
      args:
        - completion
      shell_parameter_format: cobra

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
