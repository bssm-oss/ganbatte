version: 2

project_name: ganbatte

builds:
  - binary: gnb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - repository:
      owner: bssm-oss
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/bssm-oss/ganbatte
    description: "Workflow/shortcut management CLI for lazy developers"
    license: MIT
    install: |
      bin.install "gnb"
      generate_completions_from_executable(bin/"gnb", "completion")
    test: |
      system "#{bin}/gnb", "--help"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
